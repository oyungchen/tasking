<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Tasks</h1>
            <div class="filter-controls">
                <span id="peers-self"></span>
                <button id="fullscreen-btn" class="btn-icon" title="View all descriptions">&#9776;</button>
            </div>
        </header>

        <div id="peers-bar" class="peers-bar">
            <span id="peers-list"></span>
            <span class="peers-none" id="peers-none">No one else online</span>
        </div>

        <div class="timeline-slider">
            <div class="slider-track" id="slider-track">
                <div class="slider-range" id="slider-range"></div>
                <div class="slider-handle" id="handle-start"><span class="handle-label" id="label-start"></span></div>
                <div class="slider-handle" id="handle-end"><span class="handle-label" id="label-end"></span></div>
            </div>
        </div>

        <div class="grid-scroll">
            <table class="task-grid">
                <thead>
                    <tr>
                        <th class="date-col">Date</th>
                        <th class="status-col pending-col">Pending</th>
                        <th class="status-col processing-col">Processing</th>
                        <th class="status-col done-col">Done</th>
                    </tr>
                </thead>
                <tbody id="grid-body"></tbody>
            </table>
        </div>

        <button id="add-task-btn">+</button>
    </div>

    <!-- Add Task Modal -->
    <div id="add-task-modal" class="modal hidden">
        <div class="modal-content">
            <h2>New Task</h2>
            <div class="type-tabs">
                <button type="button" class="type-tab active" data-type="normal" id="tab-normal">Task</button>
                <button type="button" class="type-tab" data-type="script" id="tab-script">Script</button>
            </div>
            <form id="add-task-form">
                <input type="hidden" id="task-type" value="normal">
                <div class="form-group">
                    <input type="text" id="task-name" placeholder="Task name" required>
                </div>
                <div class="form-group normal-only">
                    <textarea id="task-description" rows="3" placeholder="Description (optional)"></textarea>
                </div>
                <div class="form-group script-only hidden">
                    <input type="text" id="task-command" placeholder="Shell command, e.g. bash deploy.sh">
                </div>
                <div class="form-group normal-only">
                    <input type="date" id="task-deadline">
                </div>
                <div class="form-group normal-only">
                    <select id="task-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group" id="add-assign-group">
                    <div class="multi-select" id="task-assign">
                        <div class="multi-select-trigger" id="task-assign-trigger">Assign to...</div>
                        <div class="multi-select-drop" id="task-assign-drop"></div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-add">Cancel</button>
                    <button type="submit">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="task-detail-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="detail-title"></h2>
            <div id="task-detail-content"></div>
            <div id="assign-section" class="assign-section hidden">
                <div class="multi-select" id="assign-target">
                    <div class="multi-select-trigger" id="assign-trigger">Assign to...</div>
                    <div class="multi-select-drop" id="assign-drop"></div>
                </div>
                <button id="assign-confirm-btn">Assign</button>
            </div>
            <div class="form-actions">
                <button id="edit-task-btn">Edit</button>
                <button id="delete-task-btn" class="btn-danger">Delete</button>
                <button id="close-detail">Close</button>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="edit-task-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Edit Task</h2>
            <form id="edit-task-form">
                <div class="form-group">
                    <input type="text" id="edit-task-name" placeholder="Task name" required>
                </div>
                <div class="form-group">
                    <textarea id="edit-task-description" rows="3" placeholder="Description"></textarea>
                </div>
                <div class="form-group">
                    <input type="date" id="edit-task-deadline">
                </div>
                <div class="form-group">
                    <select id="edit-task-priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-edit">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Fullscreen Descriptions Overlay -->
    <div id="fullscreen-overlay" class="fullscreen hidden">
        <div class="fullscreen-header">
            <h2>All Descriptions</h2>
            <button id="close-fullscreen">&times;</button>
        </div>
        <div id="fullscreen-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
